repos:
- hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - args:
    - --maxkb=1024
    id: check-added-large-files
  - id: check-ast
  - id: check-docstring-first
  - id: check-json
  - args:
    - --autofix
    id: pretty-format-json
  - id: check-toml
  - args:
    - --fix
    - auto
    id: mixed-line-ending
  - args:
    - --pytest-test-first
    id: name-tests-test
  - id: requirements-txt-fixer
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
- hooks:
  - args:
    - --skip
    - tests/*.py
    - --skip
    - CHANGELOG.md
    id: codespell
    language: python
    types:
    - text
  repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
- hooks:
  - exclude: Makefile*
    id: remove-tabs
  repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.5
- hooks:
  - args:
    - --fix
    id: ruff
    types_or:
    - python
    - pyi
    - jupyter
  - id: ruff-format
    types_or:
    - python
    - pyi
    - jupyter
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.0
- hooks:
  - id: commitizen
    stages:
    - commit-msg
  repo: https://github.com/commitizen-tools/commitizen
  rev: v4.4.1
- hooks:
  - args:
    - --exclude
    - cytoprofiling
    id: interrogate
  repo: https://github.com/econchick/interrogate
  rev: 1.7.0
- hooks:
  - id: uv-lock
  - id: uv-export
  - args:
    - --locked
    - --all-packages
    id: uv-sync
  repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.6.6
